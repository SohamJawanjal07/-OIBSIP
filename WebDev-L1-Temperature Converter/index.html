<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Temperature Converter</h1>
            <p class="subtitle">Convert between Celsius, Fahrenheit, and Kelvin</p>

            <!-- Input Section -->
            <div class="input-section">
                <div class="form-group">
                    <label for="temperature">Temperature Value</label>
                    <input 
                        type="number" 
                        id="temperature" 
                        placeholder="Enter temperature"
                        step="0.01"
                    >
                    <span class="error-message" id="error"></span>
                </div>

                <div class="form-group">
                    <label for="input-unit">Input Unit</label>
                    <select id="input-unit">
                        <option value="celsius">Celsius (°C)</option>
                        <option value="fahrenheit">Fahrenheit (°F)</option>
                        <option value="kelvin">Kelvin (K)</option>
                    </select>
                </div>

                <button class="convert-btn" onclick="convert()">Convert</button>
            </div>

            <!-- Error Alert -->
            <div class="alert alert-danger" id="alert" style="display: none;"></div>

            <!-- Results Section -->
            <div class="results-section" id="results" style="display: none;">
                <h3>Results</h3>
                <div class="results-grid">
                    <div class="result-card">
                        <div class="result-label">Celsius</div>
                        <div class="result-value" id="result-celsius">-</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Fahrenheit</div>
                        <div class="result-value" id="result-fahrenheit">-</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Kelvin</div>
                        <div class="result-value" id="result-kelvin">-</div>
                    </div>
                </div>
            </div>

            <!-- Info Box -->
            <div class="info-box">
                <p><strong>Note:</strong> Absolute zero is −273.15°C. Values below this cannot exist in reality.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
